<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/leancloud-storage@4.15.0/dist/av-min.js"></script>
<script src="//cdn.jsdelivr.net/npm/xss@1.0.14/dist/xss.min.js"></script>
<script>
    // ================= 配置区 =================
    const APP_ID = '7DskOMG6exb3QzJdatkZVLvj-MdYXbMMI';     // 🔴 必填
    const APP_KEY = 'Kgaf0mnSA2nlYMoZgkLfEzQn';   // 🔴 必填
    const ADMIN_HASH = '50d1587ff34a6910c8e76b899d69eae2';    // 🔴 设置一个简单的发布密码(不再依赖Artitalk的用户系统，直接这里验证)
    // =========================================

    // 初始化 LeanCloud
    const { Query, User } = AV;
    AV.init({
        appId: APP_ID, appKey: APP_KEY,
        serverURLs: "https://api.youngreviews.cc"
    });

    let page = 0;
    const pageSize = 5;

    let isAdmin = localStorage.getItem('memo_admin_md5') === ADMIN_HASH;

    // 1. 加载说说逻辑
    async function loadMemos() {
        const query = new AV.Query('shuoshuo'); // 读取你原来的表
        query.descending('createdAt');
        query.limit(pageSize);
        query.skip(page * pageSize);

        try {
            const results = await query.find();
            const listDiv = document.getElementById('memos-list');
            const loadBtn = document.getElementById('load-more-btn');

            if (page === 0) listDiv.innerHTML = '';

            if (results.length === 0) {
                loadBtn.style.display = 'none';
                if (page === 0) listDiv.innerHTML = '<div class="empty">暂无内容</div>';
                return;
            }

            results.forEach(memo => {
                const content = filterXSS(memo.get('content'));
                const dateObj = memo.createdAt;
                const dateStr = `${dateObj.getFullYear()}/${(dateObj.getMonth() + 1).toString().padStart(2, '0')}/${dateObj.getDate().toString().padStart(2, '0')} ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;
                // 获取唯一ID，用于删除
                const objectId = memo.id;

                // 判断是否显示删除按钮
                const delBtnHtml = isAdmin ? `<span class="del-btn" onclick="deleteMemo('${objectId}', this)">删除</span>` : '';

                const item = document.createElement('div');
                item.className = 'memo-item';
                item.innerHTML = `
                    <div class="memo-avatar"></div>
                    <div class="memo-content">
                        <div class="memo-text">${content}</div>
                        <div class="memo-meta">
                            <span class="memo-date">${dateStr}</span>
                            ${delBtnHtml}
                        </div>
                    </div>
                `;
                listDiv.appendChild(item);
            });

            page++;
            loadBtn.style.display = 'block';
        } catch (error) {
            console.error(error);
            alert('加载失败，请检查网络');
        }
    }

    // 2. 验证身份 (点击钥匙按钮)
    function verifyAdmin() {
        const inputPass = document.getElementById('memo-pass').value;

        if (md5(inputPass) === ADMIN_HASH) {
            localStorage.setItem('memo_admin_md5', ADMIN_HASH);
            isAdmin = true;
            alert('身份验证成功！🔓');
            // 重新加载列表，把删除按钮显示出来
            page = 0;
            loadMemos();
            document.getElementById('memo-pass').value = '';
        } else {
            alert('验证失败🚫');
        }
    }



    // 2. 发布说说逻辑
    async function postMemo() {
        const content = document.getElementById('memo-content').value;
        const inputPass = document.getElementById('memo-pass').value;

        if (!content) return alert('写点什么吧？');
        if (!isAdmin && md5(inputPass) !== ADMIN_HASH) return alert('请输入正确密码');

        const btn = document.getElementById('post-btn');
        btn.innerText = '发送中...';
        btn.disabled = true;

        try {
            const Memo = AV.Object.extend('shuoshuo');
            const memo = new Memo();
            memo.set('content', content);

            const acl = new AV.ACL();
            acl.setPublicReadAccess(true);  // 允许所有人读
            acl.setPublicWriteAccess(true); // 允许所有人写/删
            memo.setACL(acl);


            await memo.save();

            // 发布成功自动设为管理员
            if (!isAdmin) {
                localStorage.setItem('memo_admin_md5', ADMIN_HASH);
                isAdmin = true;
            }

            alert('发布成功！⚡️');
            document.getElementById('memo-content').value = '';
            page = 0;
            loadMemos();
        } catch (error) {
            console.error(error);
            alert('发送失败: ' + error.message);
        } finally {
            btn.innerText = '发送 🚀';
            btn.disabled = false;
        }
    }

    // 4. 删除说说 (新增功能)
    async function deleteMemo(id, btnElement) {
        if (!confirm('确定要删除这条记忆吗？🗑️')) return;

        try {
            const todo = AV.Object.createWithoutData('shuoshuo', id);
            await todo.destroy();
            // 视觉上直接移除该元素，不用刷新页面
            const item = btnElement.closest('.memo-item');
            item.style.opacity = '0';
            setTimeout(() => item.remove(), 300);
            alert('已删除');
        } catch (error) {
            console.error(error);
            alert('删除失败，请检查 LeanCloud 后台权限设置');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // 如果已经登录，自动把密码框填上（可选）
        if (isAdmin) {
            document.getElementById('memo-pass').placeholder = "已是管理员";
        }
        loadMemos();
    });

</script>

  <script>
    function toggleMenu() {
      const sidebar = document.querySelector('.sidebar');
      sidebar.classList.toggle('active');
    }
    // 2. 自动收回逻辑：当页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function () {
      const sidebar = document.querySelector('.sidebar');

      // 监听侧边栏内的点击动作
      sidebar.addEventListener('click', function (e) {
        // 如果点击的是链接 (A 标签) 或者链接里的文字 (SPAN)
        if (e.target.closest('a')) {
          sidebar.classList.remove('active');
        }
      });

      // 点击侧边栏外部区域关闭（增强体验）
      document.addEventListener('click', function (e) {
        const menuToggle = document.querySelector('.menu-toggle');
        if (sidebar.classList.contains('active') &&
          !sidebar.contains(e.target) &&
          e.target !== menuToggle) {
          sidebar.classList.remove('active');
        }
      });
    });

    let currentRotation = 0;

    function rotateAvatar() {
      currentRotation += 360; // 每次点击增加 360 度
      const avatar = document.getElementById('user-avatar');
      avatar.style.transform = `rotate(${currentRotation}deg)`;
    }
  </script>
